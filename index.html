<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <div class="header-top">
        <span class="brand">⚽ World Cup 2026</span>
        <span class="live-pill">
          <span class="live-dot"></span>
          Live
        </span>
      </div>
      <h1 id="page-title">Matches</h1>
    </header>

    <!-- MAIN -->
    <main class="content">

      <!-- Panel: Matches -->
      <section id="panel-matches" class="panel active">
        <div class="countdown-banner">
          <div>
            <p class="cd-label">FINAL OF THE WORLD CUP</p>
            <p class="cd-time" id="countdown">--</p>
          </div>
          <span class="cd-trophy">🏆</span>
        </div>
        <div id="matches-list"></div>
      </section>

      <!-- Panel: Groups -->
      <section id="panel-groups" class="panel">
        <div id="groups-list"></div>
      </section>

      <!-- Panel: Search -->
      <section id="panel-search" class="panel">
        <input
          class="search-input"
          id="search-input"
          type="text"
          placeholder="Argentina, BRA, France..."
        />
        <div id="search-result"></div>
      </section>

      <!-- Panel: Champion -->
      <section id="panel-champ" class="panel">
        <div id="champ-content"></div>
      </section>

      <!-- Panel: Knockout -->
      <section id="panel-knockout" class="panel"></section>

    </main>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">

      <!-- Matches -->
      <button class="nav-item active" data-tab="matches">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 3C10 6 10 9 12 12C14 9 14 6 12 3Z"/>
          <path d="M3.7 9L6.5 9L8.5 12M20.3 9L17.5 9L15.5 12"/>
          <path d="M6 18L8 15L16 15L18 18"/>
        </svg>
        <span>Matches</span>
      </button>

      <!-- Groups -->
      <button class="nav-item" data-tab="groups">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="3" y1="15" x2="21" y2="15"/>
          <line x1="9" y1="9" x2="9" y2="21"/>
        </svg>
        <span>Groups</span>
      </button>

      <!-- Knockout -->
      <button class="nav-item" data-tab="knockout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 3H3a2 2 0 000 4c0 2.5 2 5 4 6"/>
          <path d="M19 3h2a2 2 0 010 4c0 2.5-2 5-4 6"/>
          <path d="M7 3h10v8a5 5 0 01-10 0V3Z"/>
          <path d="M12 13v4M9 21h6"/>
        </svg>
        <span>Knockout</span>
      </button>

      <!-- Search -->
      <button class="nav-item" data-tab="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="10.5" cy="10.5" r="6.5"/>
          <line x1="15.5" y1="15.5" x2="21" y2="21"/>
        </svg>
        <span>Search</span>
      </button>

      <!-- Champion -->
      <button class="nav-item" data-tab="champ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="3"/>
          <path d="M12 11v10"/>
          <path d="M8 21h8"/>
          <path d="M6 8H3a1 1 0 01-1-1V5a1 1 0 011-1h3"/>
          <path d="M18 8h3a1 1 0 001-1V5a1 1 0 00-1-1h-3"/>
        </svg>
        <span>Champion</span>
      </button>

    </nav>

  </div><!-- /app -->

  <!-- MODAL -->
  <div class="modal-overlay" id="match-modal" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-body"></div>
    </div>
  </div>

  <!-- TOOLTIP -->
  <div id="tooltip"></div>

  <!-- JS al final del body -->
  <script src="app.js"></script>
</body>
</html>
