<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <meta http-equiv="Content-Language" content="en">
    <title>World Cup 2026</title>
    <link rel="stylesheet" href="style.css?v=3"/>
</head>
<body>
    
  <!-- Contenedor principal de la app -->
  <div class="app">

    <!-- HEADER fijo arriba -->
    <header class="header">
      <div class="header-top">
        <span class="live-pill">
          <span class="live-dot"></span>
          Live
        </span>
      </div>

      <div class="brand-lockup">
        <svg class="brand-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="cupGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--orange2)"/>
              <stop offset="100%" stop-color="var(--orange)"/>
            </linearGradient>
          </defs>
          <path d="M14 6H34V20C34 26 29.5 30 24 30C18.5 30 14 26 14 20V6Z" fill="url(#cupGrad)"/>
          <path d="M14 9H8C8 16 10 20 14.5 21.5" stroke="url(#cupGrad)" stroke-width="2.4" stroke-linecap="round" fill="none"/>
          <path d="M34 9H40C40 16 38 20 33.5 21.5" stroke="url(#cupGrad)" stroke-width="2.4" stroke-linecap="round" fill="none"/>
          <rect x="21" y="30" width="6" height="6" fill="url(#cupGrad)"/>
          <path d="M15 40C15 36.5 19 35 24 35C29 35 33 36.5 33 40V41H15V40Z" fill="url(#cupGrad)"/>
          <circle cx="20" cy="15" r="1.4" fill="var(--surface)" opacity="0.55"/>
          <circle cx="28" cy="13" r="1" fill="var(--surface)" opacity="0.4"/>
        </svg>
        <div class="brand-text">
          <span class="brand-eyebrow">World Cup</span>
          <span class="brand-year">2026</span>
        </div>
      </div>

      <!-- Título dinámico — JS lo cambia según el tab activo -->
      <h1 id="page-title">Matches</h1>


    </header>

    <!-- MAIN — zona scrolleable -->
    <main class="content">

      <!-- Panel: Partidos -->
      <section id="panel-matches" class="panel active">
        <div class="countdown-banner">
          <div>
            <p class="cd-label">FINAL OF THE WORLD CUP</p>
            <p class="cd-time" id="countdown">--</p>
            <p class="cd-sublabel">days : hours : min : sec</p>
          </div>
          <span class="cd-trophy">🏆</span>
        </div>
        <!-- JS inserta las cards aquí -->
        <div id="matches-list"></div>
      </section>

      <!-- Panel: Grupos -->
      <section id="panel-groups" class="panel">
        <div id="groups-list"></div>
      </section>

      <!-- Panel: Buscar / Goleadores -->
      <section id="panel-search" class="panel">
        <div class="subtab-toggle">
          <button class="subtab-btn active" id="subtab-search-btn" onclick="setSearchSubtab('search')">Team Search</button>
          <button class="subtab-btn" id="subtab-scorers-btn" onclick="setSearchSubtab('scorers')">Top Scorers</button>
        </div>

        <div id="subtab-search-content">
          <input
            class="search-input"
            id="search-input"
            type="text"
            placeholder="Argentina, BRA, Francia..."
          />
          <div id="search-result"></div>
        </div>

        <div id="subtab-scorers-content" style="display:none">
          <div id="scorers-list"></div>
        </div>
      </section>

      <!-- Panel: Knockout (Round of 32) -->
      <section id="panel-knockout" class="panel">
        <!-- JS inserta el contenido de knockout aquí -->
      </section>

      <!-- Panel: Campeón -->
      <section id="panel-champ" class="panel">
        <div id="champ-content"></div>
      </section>

    </main>

    <!-- NAV INFERIOR fijo -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="matches">
        <!-- SVG pelota -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 3C10 6 10 9 12 12C14 9 14 6 12 3Z"/>
          <path d="M3.7 9L6.5 9L8.5 12M20.3 9L17.5 9L15.5 12"/>
          <path d="M6 18L8 15L16 15L18 18"/>
        </svg>
        <span>Matches</span>
      </button>
      <button class="nav-item" data-tab="groups">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="3" y1="15" x2="21" y2="15"/>
          <line x1="9" y1="9" x2="9" y2="21"/>
        </svg>
        <span>Groups</span>
      </button>
      <button class="nav-item" data-tab="knockout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M4 5h6v5H4zM4 15h6v5H4zM14 9h6v5h-6z"/>
          <path d="M10 7.5h2.5a1.5 1.5 0 011.5 1.5M10 17.5h2.5a1.5 1.5 0 001.5-1.5"/>
        </svg>
        <span>Knockout</span>
      </button>
      <button class="nav-item" data-tab="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="10.5" cy="10.5" r="6.5"/>
          <line x1="15.5" y1="15.5" x2="21" y2="21"/>
        </svg>
        <span>Search</span>
      </button>
      <button class="nav-item" data-tab="champ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M8 21h8M12 17v4"/>
          <path d="M5 3H3a2 2 0 000 4c0 2.5 2 5 4 6"/>
          <path d="M19 3h2a2 2 0 010 4c0 2.5-2 5-4 6"/>
          <path d="M7 3h10v8a5 5 0 01-10 0V3Z"/>
        </svg>
        <span>Champion</span>
      </button>
    </nav>

  </div><!-- /app -->

  <!-- MODAL -->
<div class="modal-overlay" id="match-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-body"></div>
  </div>
</div>
  
  <!-- JS al final del body — así el HTML ya está cargado -->
   <div id="tooltip"></div>
  <script src="app.js?v=2"></script>
</body>
</html>
