name: Update World Cup Data

on:
  # schedule:
  #   Runs every hour — disabled: tournament finished, source is stale
  #   - cron: '0 * * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch data from openfootball
        run: |
          node scripts/fetch-data.cjs

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update world cup data [auto]"
          git push